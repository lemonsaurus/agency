[session]
name = "agency"
default_layout = "tiled"         # tiled | columns | rows | main-vertical

[theme]
active_border = "#89b4fa"        # Catppuccin blue
inactive_border = "#45475a"      # Catppuccin surface1
status_bg = "#181825"            # Catppuccin mantle
status_fg = "#cdd6f4"            # Catppuccin text

[agents.claudejail]
command = "claudejail"
icon = "🔒"
border_color = "#f38ba8"         # red

[agents.claudejail-mac]
command = "claudejail-mac"
icon = "🔒"
border_color = "#f388ff"         # pink

[agents.claude]
command = "claude"
icon = "🤖"
border_color = "#cba6f7"         # mauve

[agents.codex]
command = "codex"
icon = "🧠"
border_color = "#89b4fa"         # blue

[agents.gemini]
command = "gemini"
icon = "✦"
border_color = "#f9e2af"         # yellow

# Keybindings — all values use tmux key notation.
# Uncomment and change any binding you want to customize.
# Navigation (arrow keys) and resize (shift+arrows) are not configurable.
#
# [keys]
# prefix = "C-b"                  # tmux prefix key
# palette = "a"                   # open command palette
# terminal = "1"                  # spawn plain terminal
# layout_tiled = "="              # tiled grid layout
# layout_columns = "|"            # side-by-side columns
# layout_rows = "-"               # stacked rows
# layout_main_vert = "m"          # main-vertical layout
# layout_cycle = "Space"          # cycle through layouts
# kill_pane = "x"                 # kill pane (with confirm)
# kill_session = "q"              # kill session (with confirm)
# zoom = "z"                      # toggle pane zoom
# broadcast = "b"                 # broadcast to all panes
# detach = "d"                    # detach client
# respawn = "r"                   # respawn dead pane
# copy_mode = "["                 # enter copy mode
# paste = "]"                     # paste buffer

